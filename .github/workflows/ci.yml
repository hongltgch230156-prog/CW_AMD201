name: CI/CD Pipeline - CW_AMD201

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DOTNET_VERSION: '8.0.x'
  DOCKER_REPOSITORY: ${{ secrets.DOCKER_USERNAME }}/cw_amd201

jobs:
  build-and-test-crud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore CRUD
        run: dotnet restore Service_CRUD/Service_CRUD.csproj

      - name: Build CRUD
        run: dotnet build Service_CRUD/Service_CRUD.csproj --no-restore --configuration Release

      - name: Test CRUD (optional)
        run: dotnet test Service_CRUD/Service_CRUD.csproj --no-build --verbosity normal || true

  build-and-test-urlshorten:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore URL Shorten
        run: dotnet restore Service_URL_Shorten/Service_URL_Shorten.csproj

      - name: Build URL Shorten
        run: dotnet build Service_URL_Shorten/Service_URL_Shorten.csproj --no-restore --configuration Release

      - name: Test URL Shorten (optional)
        run: dotnet test Service_URL_Shorten/Service_URL_Shorten.csproj --no-build --verbosity normal || true

  build-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API Gateway
        run: dotnet restore Service_API_Gateway/Service_API_Gateway.csproj

      - name: Build API Gateway
        run: dotnet build Service_API_Gateway/Service_API_Gateway.csproj --no-restore --configuration Release

  cd-push-docker:
    runs-on: ubuntu-latest
    needs: [build-and-test-crud, build-and-test-urlshorten, build-gateway]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push CRUD Image
        uses: docker/build-push-action@v5
        with:
          context: ./Service_CRUD
          push: true
          tags: ${{ env.DOCKER_REPOSITORY }}:crud-${{ github.sha }}

      - name: Build & Push URL Shorten Image
        uses: docker/build-push-action@v5
        with:
          context: ./Service_URL_Shorten
          push: true
          tags: ${{ env.DOCKER_REPOSITORY }}:urlshorten-${{ github.sha }}

      - name: Build & Push API Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: ./Service_API_Gateway
          push: true
          tags: ${{ env.DOCKER_REPOSITORY }}:gateway-${{ github.sha }}
