name: CI/CD Pipeline - CW_AMD201

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DOTNET_VERSION: '8.0.x'
  DOCKER_REPOSITORY: ${{ secrets.DOCKER_USERNAME }}/cw_amd201

jobs:
  build-and-test-crud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test Service_CRUD/Service_CRUD.csproj --no-build --verbosity normal || true

  build-and-test-urlshorten:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test Service_URL_Shorten/Service_URL_Shorten.csproj --no-build --verbosity normal || true

  build-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - run: dotnet build Service_API_Gateway/Service_API_Gateway.csproj --no-restore

  cd-push-docker:
    runs-on: ubuntu-latest
    needs: [build-and-test-crud, build-and-test-urlshorten, build-gateway]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Service_CRUD
          push: true
          tags: ${{ env.DOCKER_REPOSITORY }}:crud-${{ github.sha }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Service_URL_Shorten
          push: true
          tags: ${{ env.DOCKER_REPOSITORY }}:urlshorten-${{ github.sha }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Service_API_Gateway
          push: true
          tags: ${{ env.DOCKER_REPOSITORY }}:gateway-${{ github.sha }}
